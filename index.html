<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSCO Live Finance Dashboard</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <div class="header-main">
                <h1 id="company-name">Cisco Systems, Inc.</h1>
                <div id="ticker-display" class="ticker-badge">CSCO</div>
            </div>
            <p class="subtitle"><span id="exchange-display">NASDAQ</span> • Live Feed <span class="pulse-dot"></span></p>
        </div>
        
        <div id="datetime-pill" class="datetime-pill">
            Loading...
        </div>
        
        <div class="header-right">
            <form id="ticker-form" class="ticker-form">
                <input type="text" id="ticker-input" placeholder="Enter ticker (e.g. AAPL)" autocomplete="off" required />
                <button type="submit" class="search-btn" aria-label="Search Ticker">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </form>
        </div>
    </header>

    <main class="dashboard-grid">
        <div class="sidebar-column">
            <section id="price-section">
                <h2>Live Price</h2>
                <div class="price-display">
                    <p id="price">Loading...</p>
                    <span id="price-change" class="change-tag">--</span>
                </div>
                
                <!-- Portfolio Manager -->
                <div class="portfolio-manager">
                    <div class="shares-input-group">
                        <label for="holdings-input">Shares Owned:</label>
                        <input type="number" id="holdings-input" min="0" step="any" placeholder="0" />
                    </div>
                    
                    <div class="portfolio-divider"></div>
                    
                    <div class="portfolio-list-header">My Holdings</div>
                    <div id="portfolio-list" class="portfolio-list">
                        <!-- Dynamic holdings items -->
                    </div>
                    
                    <div class="portfolio-total">
                        <span>Total Portfolio Value</span>
                        <span id="total-portfolio-value">$0.00</span>
                    </div>
                </div>
            </section>

            <section id="stats-section">
                <h2>Market Summary</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Open</span>
                        <span id="stat-open" class="stat-value">Loading...</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Previous Close</span>
                        <span id="stat-close" class="stat-value">Loading...</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Day High</span>
                        <span id="stat-high" class="stat-value">Loading...</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Day Low</span>
                        <span id="stat-low" class="stat-value">Loading...</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Volume</span>
                        <span id="stat-volume" class="stat-value">Loading...</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Mkt Cap</span>
                        <span id="stat-mktcap" class="stat-value">Loading...</span>
                    </div>
                </div>
            </section>
        </div>

        <div class="main-column">
            <section id="news-section">
                <h2>Latest Market News</h2>
                <ul id="news-list"></ul>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
